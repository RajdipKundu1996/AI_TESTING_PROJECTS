<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA-Gen AI | Login — eMudhra Test Orchestrator</title>
  <meta name="description" content="QA-Gen AI is a professional AI-based test plan orchestration platform powered by eMudhra." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <!-- PARTICLE CANVAS BACKGROUND -->
  <canvas id="particleCanvas" class="particle-canvas"></canvas>

  <div class="bg-canvas">
    <div class="hex-grid">
      <div class="hex h1"></div><div class="hex h2"></div><div class="hex h3"></div>
      <div class="hex h4"></div><div class="hex h5"></div><div class="hex h6"></div>
    </div>
    <div class="geometric-overlay"></div>
  </div>

  <div class="login-container">
    <div class="brand-header">
      <div class="brand-logo" style="margin-bottom: 20px;">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="220" height="55" aria-label="eMudhra Logo">
          <!-- Stylized 'e' Emblem -->
          <circle cx="40" cy="40" r="35" fill="#f58220" />
          <path d="M40 20 A20 20 0 1 0 40 60 L40 50 A10 10 0 1 1 40 30" fill="white" />
          <rect x="40" y="35" width="25" height="10" fill="white" />
          <!-- eMudhra Text -->
          <text x="85" y="55" font-family="Outfit, sans-serif" font-weight="800" font-size="38" fill="white">eMudhra</text>
        </svg>
      </div>
      <div style="font-size:1.2rem; font-weight:700; color:var(--white); font-family:'Outfit'; margin-bottom: 8px;">QA-Gen AI</div>
      <p class="brand-tagline">Enterprise-Grade AI Testplan Orchestrator</p>
    </div>

    <div class="login-card" id="loginCard">
      <div class="card-glow"></div>
      <div class="card-shimmer"></div>

      <div class="form-group">
        <label for="username" class="form-label">UserName</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text" id="username" name="username" class="form-input" placeholder="Username or email (@emudhra.com)" autocomplete="username" />
        </div>
        <div class="domain-hint">Only <strong>@emudhra.com</strong> domain emails are accepted</div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" />
          <button class="toggle-password" id="togglePassword" type="button" aria-label="Toggle password visibility">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="loginError" class="error-message" style="display:none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span id="loginErrorText">Invalid credentials.</span>
      </div>

      <button class="btn-login" id="loginBtn" type="button">
        <span class="btn-text">Login</span>
        <span class="btn-loader" style="display:none;">
          <span class="spinner"></span>
        </span>
      </button>

      <div class="login-links">
        <a href="#" class="link-forgot">Forgot Password?</a>
        <a href="#" class="link-signup">Sign up for a new account</a>
      </div>
    </div>

    <!-- REQUEST A DEMO -->
    <button class="btn-demo" id="requestDemoBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Request a Demo
    </button>
  </div>

  <footer class="login-footer">
    <div class="footer-brand">
      <div class="emudhra-logo" style="gap:12px">
        <svg viewBox="0 0 100 100" width="42" height="42" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3))">
          <circle cx="50" cy="50" r="45" fill="#1a3a6b" stroke="#3b82f6" stroke-width="2" />
          <text x="50" y="65" text-anchor="middle" fill="white" font-size="50" font-weight="900" font-family="Outfit">e</text>
        </svg>
        <span class="emudhra-text" style="font-size:1.4rem">eMudhra</span>
      </div>
    </div>
    <div class="footer-center">
      <p class="footer-powered">Powered by eMudhra</p>
      <p class="footer-copy">© 2026 eMudhra. All rights reserved. Professional UI Theme Powered by eMudhra Digital Services.</p>
    </div>
    <div class="star-icon">✦</div>
  </footer>

  <script src="js/login.js"></script>
</body>
</html>
